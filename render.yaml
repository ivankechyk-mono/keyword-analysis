services:
  - type: web
    name: monobank-keyword-analysi
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENOT_API_KEY
        sync: false
      - key: DEVELOPER_TOKEN
        sync: false
      - key: CLIENT_ID
        sync: false
      - key: CLIENT_SECRET
        sync: false
      - key: REFRESH_TOKEN
        sync: false
      - key: CUSTOMER_ID
        sync: false
      - key: SPREADSHEET_ID
        sync: false
      - key: SERVICE_ACCOUNT_JSON_CONTENT
        sync: false
